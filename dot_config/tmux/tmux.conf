# 一个session - 多个窗口
# 一个窗口 - 多个pane
# 完全可以在不同的terminal切换打开

# 基本命令
# : 进入 tmux命令行模式
# ? 显示快捷键帮助 , q退出

##### session 操作
# d deattch当前session
# c-z 挂起, fg可以恢复
# tmux attach [-t sessionname] 恢复  alias to tma
# $ 重命名
# tmux ls 显示tmux的所有session

##### window 操作
# c 创建一个新的window
# & 关闭当前window
# , 重命名当前window
# p 前一个window
# n 后一个window
# l 切换到上次使用的window  【被改写，换成vim方式】
# NO  切换到指定数字的窗口
# w 显示当前会话的窗口，可以通过上下左右选择
# tmux neww -n win_name 新建一个窗口
# f 搜索所有窗口

####@ pane 操作
# " 横向切分   s [改写成Vim的分屏方式]
# % 纵向   v [Vim]
# 方向键   移动   hjkl[改写成vim移动方式]
# o 切换到下一个
# alter + 方向键  调整pane大小
# q 显示pane编号
# x 关闭当前pane，会有提示，可以直接ctrl-d
# { 当前移到左边
# } 当前移到右边
# z 当前pane最大化/恢复  【很有用】
# space 切换到下一部剧    【当前不可用】


# use C-a, since it's on the home row and easier to hit than C-b
set-option -g prefix C-a
unbind-key C-a
bind-key C-a send-prefix
set -g base-index 1

# Easy config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# colors
#set -g default-terminal "screen-256color"
#set -g default-terminal "tmux-265color"
#set -ga terminal-override ",*256col*:Tc"
# Add truecolor support
set-option -ga terminal-overrides ",xterm-256color:Tc"
# Default terminal is 256 colors
set -g default-terminal "tmux-256color"
setw -g xterm-keys on

# vi is good
setw -g mode-keys vi

# mouse behavior
set -g mouse on

# history
set -g history-limit 5000
bind-key L clear-history

# use vim-like keys for splits and windows
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

#bind-key c new-window

# copy & paste
bind-key [ copy-mode
bind-key ] paste-buffer
run -b 'tmux bind -t vi-copy v begin-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi v send -X begin-selection 2> /dev/null || true'
run -b 'tmux bind -t vi-copy C-v rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi C-v send -X rectangle-toggle 2> /dev/null || true'
run -b 'tmux bind -t vi-copy y copy-selection 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi y send -X copy-selection-and-cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy Escape cancel 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi Escape send -X cancel 2> /dev/null || true'
run -b 'tmux bind -t vi-copy H start-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi H send -X start-of-line 2> /dev/null || true'
run -b 'tmux bind -t vi-copy L end-of-line 2> /dev/null || true'
run -b 'tmux bind -T copy-mode-vi L send -X end-of-line 2> /dev/null || true'

# copy to macOS clipboard
if -b 'command -v pbcopy > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | pbcopy"'
if -b 'command -v reattach-to-user-namespace > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | reattach-to-user-namespace pbcopy"'
# copy to X11 clipboard
if -b 'command -v xsel > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xsel -i -b"'
if -b '! command -v xsel > /dev/null 2>&1 && command -v xclip > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | xclip -i -selection clipboard >/dev/null 2>&1"'
# copy to Windows clipboard
if -b 'command -v clip.exe > /dev/null 2>&1' 'bind y run -b "tmux save-buffer - | clip.exe"'
if -b '[ -c /dev/clipboard ]' 'bind y run -b "tmux save-buffer - > /dev/clipboard"'

bind b list-buffers  # list paste buffers
bind p paste-buffer  # paste from the top paste buffer
bind P choose-buffer # choose which buffer to paste from

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
# source-file "${HOME}/.tmux-themepack/powerline/default/blue.tmuxtheme"
run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -agF status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
#set -agF status-right "#{E:@catppuccin_status_battery}"

run ~/.config/tmux/plugins/tmux-plugins/tmux-cpu/cpu.tmux
#run ~/.config/tmux/plugins/tmux-plugins/tmux-battery/battery.tmux